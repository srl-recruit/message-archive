       subj:"【Day5直前案内】会場・プログラム・参加メンバーについて",
       body:"〇〇大学\n〇〇 〇〇さん\n\n\n明日、インターンシップ最終日Day5のご案内です。\n\n──\n〈会場〉アクア博多ビル 3F 会議室B (福岡市博多区中洲5丁目3-8)\n〈時間〉 13:00〜(12:45より入場可能です)\n〈持ち物〉 筆記用具・メモできるもの\n──\n〈プログラムの流れ〉\n社長による研修や、SRLメンバーとのリアルトーク・座談会などを通じて、「働くこと」「SRL」をリアルに感じてもらえる1日です。\n最後には早期選考のご案内も予定しています！\n\n〈参加予定メンバー〉\n明日は人材開発部 〇〇・〇〇に加え、4名のSRLメンバーが参加します！\n\n・新田社長\n→SRLの代表。会社の想いやビジョンを一番近くで聞けるチャンスです。\n\n・〇〇シニアマネージャー(直営事業部)\n→3人のお子さんを育てながら、直営店舗やオンラインショップの運営、新規事業企画にも幅広く携わるメンバーです。キャリアと家庭の両立についてもぜひ聞いてみてください！\n\n・〇〇マネージャー(新規事業開発部)\n若くして新規事業にチャレンジを続ける姿から、SRLでの挑戦のリアルを知ることができます！\n\n・〇〇店長(営業開発部)\n→店舗運営の責任者。マネジメントやチームづくりに加え、クライアントとの関係づくり、価値の提供についてもリアルに語ってくれます。\n\n\n※座談会の時間に向けて、「聞いてみたいこと」を事前に考えてきていただけると嬉しいです😊\nSRLメンバーはNGなしでお答えします！\n──\n\n道中お気をつけてお越しください！\n皆さんにまたお会いできるのを楽しみにしています。\n\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["インターン","Day5","直前案内","参加メンバー紹介","座談会"],
       note:"参加メンバーを事前に紹介するのは非常に効果的。誰が来るかを知ることで学生が事前に質問を考えやすくなる。メンバー紹介では役職だけでなく「3人のお子さんを育てながら」のような人間的なエピソードを添えることで、座談会への期待感が高まる。「NGなしでお答えします」という一文が学生の遠慮を取り除く。",
       good:["参加メンバーを事前紹介して質問準備を促している","メンバー紹介が役職だけでなく人間的エピソードを含む","「NGなしで」という一文が心理的安全を作っている"]},
    
      {id:9,phase:"インターン後フォロー",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"5日間のご参加ありがとうございました",
       body:"〇〇 〇〇さん\n\nこのたびは5日間にわたるインターンシップにご参加いただき、誠にありがとうございました！\n最終日まで真摯に取り組んでいただけたこと、心より感謝申し上げます。\n\n今回のプログラムを通じて、SRLで働くことの魅力や、自分自身の可能性を感じ取っていただけていれば幸いです。\nここまで積極的に向き合ってくださった〇〇さんと、ぜひ今後もご一緒できることを心から願っております。\n\n下記2点、ご確認をお願いいたします。\n──\n・以下のアンケートフォームより、ご回答をお願いいたします。(明日〔〇/〇〕中のご回答をお願いします)\n※アンケートのご回答をもって、早期選考のご案内を差し上げます。\n▷(URL)\n\n・TAVシートにDay5の欄を設けておりますので、ご記入ください。\n──\n\n5日間を通して、皆さんの姿から私たち自身も大きな学び、気づきをいただきました。\nSRLに共感していただけた方には、ぜひ選考にも進んでいただき、将来SRLの仲間として共に歩んでいけることを楽しみにしております。\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["インターン後","感謝","アンケート","早期選考誘導"],
       note:"感謝→アクション依頼→締め、という構成。「アンケート回答をもって早期選考のご案内」という条件を明示することでアンケート回収率を高めながら選考意欲の確認もできる。「私たち自身も大きな学び、気づきをいただいた」という一文は学生との関係を対等にする効果がある。",
       good:["次のアクションと選考案内を連動させている","「私たちも学びをいただいた」で関係性を対等にしている","アクション依頼を──で区切って本文と視覚的に分けている"]},
    
      {id:10,phase:"早期選考案内",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"【早期選考のご案内】提出書類・選考フロー・選考前面談について",
       body:"〇〇 〇〇さん\n\n\nこんにちは！\n株式会社SRL 〇〇です。\n\n本日は早期選考のご案内です。\n\n下記の提出物と提出期限をご確認いただき、ご提出をお願いいたします。\n\nまた、今回ご案内するにあたり、最新の募集要項をPDFにて添付しております。\n来年度からの給与改定を反映した最新版で、外部にはまだ公開していない内容も含まれておりますので、併せてご確認ください。\n(募集要項には選考フローも記載しています)\n\n──\n\n① 応募書類3点の提出(提出期限：〇月〇日(〇曜日)まで）\n\n【エントリーシート（Web上で入力）】\n以下のフォームより、必要事項をご入力のうえご提出ください。\n(URL)\n\n\n【ライフラインシート（ファイル提出）】\n①添付の「記入用シート」をダウンロード\n②ご記入\n③以下のフォームよりアップロードして提出\n\n▶提出フォーム\n(URL)\n\n※記入例も添付しておりますのでご確認ください\n\n\n\n【適性検査】\n本日中に、メール(学生メールアドレス 宛)にてご案内をお送りします。\n\n──\n\n② 二次選考へのご案内(〇月より実施予定)\n\n通常フローでは「一次選考」からのご案内となりますが、今回インターンに参加された皆さまは一次選考を免除し、「二次選考」からご案内いたします。\n\nその前にご提出いただく書類や適性検査は必須となりますが、これらの結果で選考を落とすことはございませんのでご安心ください。\n\n──\n\nそして今回早期選考をご希望された皆さまには、通常より早いタイミングで二次選考に進んでいただくことになります。\nその前に、私(人材開発部/〇〇)との選考前面談の機会を〇月下旬に設けようと考えています。\n\nこの面談では、\n\n・これまでのインターンやSRLとの接点を振り返る\n・経営陣との面接に臨む前に、自分の考えや就活の軸を整理する\n・選考に関する不安や疑問を解消する\n\nといったことをお話しできればと思っています。\n選考内容には一切関係なく、選考への影響もない面談となります。\n\nなお、〇〇さんはこれまでのインターンの場面でも主体的に取り組まれていて、その姿勢から多くの成長や強みを感じています。\nそうした積み重ねを、次の二次選考でもしっかり発揮していただけるよう、ぜひこの面談の機会も活用していただきたいと思っております。\n\n参加は任意ですが、希望される場合はぜひご連絡ください。日程については追って調整させていただきます。\n\nそれではご提出、お待ちしております！\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["早期選考","提出書類","一次免除","選考前面談","個別メッセージ"],
       note:"情報量が多いため①②と番号で整理することが必須。「外部にはまだ公開していない内容も含まれる」という一文は学生に特別感と信頼感を与える重要な言葉。最後に「〇〇さんはこれまでのインターンの場面でも主体的に」という個別の感想を入れることで、一斉送信の中に個別メッセージの温度を乗せている。",
       good:["①②で大きな区切りを作り情報を整理している","「外部未公開情報を共有」という一文で特別感を演出","最後に個別の印象を入れて一斉文に個別感を加えている"]},
    
      {id:11,phase:"選考前面談",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"【選考前面談】当日のご案内",
       body:"〇〇 〇〇さん\n\n選考前面談のご予約ありがとうございます！\n当日のご案内をお送りいたします。\n\n──────────────\n・日時：〇/〇(〇曜日) 〇〇:〇〇〜〇〇:〇〇\n・Zoomリンク：(URL)\n・ミーティングID：(ミーティングID)\n・パスコード：なし\n──────────────\n\nこの面談は、役員との二次選考に進む前に、採用担当の〇〇と気軽に話せる時間です。会社のことを深く知るのはもちろん、自分の考えを整理したり、不安や疑問を解消したりできる場にしてほしいと思っています。\n\nせっかくなので、\n\n・事業や取り組みについてもっと知りたいこと\n・働き方やカルチャーで気になっていること\n・なぜ〇〇さんがSRLを志望するのか、どんな就活軸で動いているのか\n\nなどを、ぜひ言語化して準備しておいてください！以上を少し考えて臨むだけで、ぐっと有意義な時間になるはずです。\n\n当日は5分前を目安にご参加ください。\nよろしくお願いいたします！\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["選考前面談","直前案内","事前準備","個別面談"],
       note:"「役員との二次選考に進む前に、気軽に話せる時間」という位置づけを明確にして学生の緊張を和らげている。事前に考えてきてほしいことを箇条書きで示すのは面談の質を上げるためだけでなく、学生に「準備できる安心感」を与えるためでもある。「ぐっと有意義な時間になるはずです」という前向きな後押しが自然。",
       good:["「気軽に話せる時間」という位置づけで緊張を和らげている","事前準備ポイントを箇条書きで示し臨みやすくしている","「ぐっと有意義になる」という前向きな言い方が押しつけがましくない"]},
    
      {id:12,phase:"リマインド",ch:"LINE",dir:"送信",date:"〇/〇（期限当日）",
       subj:"【リマインド】本日期限：ES・ライフラインシート・適性検査",
       body:"※リマインド※\n\n〇〇 〇〇さん\n\n\n以下の提出・受検について、本日が期限となっております。\n・エントリーシート提出\n・ライフラインシート提出\n・適性検査の受検\n\n期限内のご提出・ご受検をお願いいたします。\n\n(既に完了いただいている方には、重複のご案内となりますことをご容赦ください。)\n\n引き続きよろしくお願いいたします。\n──────────────\n株式会社SRL\n採用担当",
       tags:["リマインド","提出期限","ES","適性検査"],
       note:"リマインドはシンプルが正解。「※リマインド※」と冒頭に明示することで既読スルーを防ぐ。完了済みの方への断りを一言入れることで「また送ってきた」という不快感を軽減している。体裁を整えすぎず、短くても機能するメッセージの典型例。",
       good:["「※リマインド※」の明示で確認を促している","完了済みの方への一言断りが丁寧","短くて読む負担がない"]},
    
      {id:13,phase:"一次選考結果",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"【選考結果のご連絡】一次選考通過",
       body:"【選考結果のご連絡】\n\n〇〇 〇〇さん\n\n\n先日は、一次選考にご参加いただきありがとうございました。\n\n応募書類および面接内容を踏まえた社内審議の結果、【一次選考通過】となりました。〇〇さんにはぜひ二次選考にお進みいただければと存じます。\n\n──\n■ 二次選考\n場所：対面│SRL本社\n内容：役員との個別面接\n\n■日程候補\n〇/〇(〇曜日)・〇/〇(〇曜日)\n\n■予約リンク\n(URL)\n\n■ 予約期限\n〇/〇(〇曜日) 23:59まで\n\n※ LINEトーク画面下の【選考予約】からもご予約いただけます。\n──\n\nあわせて、二次選考に進んでいただくにあたり、下記のご対応をお願いいたします。\n\n――――――――\n《追加課題 コアバリューワーク》\n\nSRL社内で実施する「コアバリューワーク」にお取り組みいただきます。本ワークは、ご自身が大切にしている価値観を言語化・整理するためのものです。\n\n添付の「コアバリューワークシート」をご確認のうえ、指示に沿って進めてください。\n\n▶ 事前提出(フォームで回収)\n\n以下の2点の回答をフォームよりご提出ください。\n\n1）STEP5│絞り込んだご自身の価値観(5〜7語)\n2）STEP6│コアバリューフレーズ(3つ)\n\nフォームURL：\n(URL)\n\n【提出期限】〇/〇(〇曜日) 23:59まで\n\n※ 内容について、選考内でお伺いする場合がございます。\n――――――――\n\n以上ご確認・ご対応のほど、よろしくお願いいたします。ご不明点等ございましたら遠慮なくご連絡ください！\n\n選考にて〇〇さんをお待ちしております。\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["一次選考","通過","二次選考案内","コアバリュー"],
       note:"件名冒頭に【選考結果のご連絡】と入れることで開封した瞬間に内容がわかる。通過報告→次の選考情報→追加課題、という流れを1通にまとめているが■で整理されているため読みやすい。「選考にてお待ちしております」という結びが歓迎感を出している。",
       good:["【選考結果のご連絡】で開封後すぐ内容がわかる","通過報告と次のアクションを1通にまとめている","「選考にてお待ちしております」で歓迎感を演出"]},
    
      {id:14,phase:"一次選考結果",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"【選考結果のご連絡】一次選考見送り",
       body:"【選考結果のご連絡】\n\n〇〇 〇〇さん\n\n先日は一次選考にご参加いただき、ありがとうございました。\n\n応募書類や面接を踏まえて社内にて厳正に検討した結果、誠に恐縮ながら今回の選考ではご希望に添いかねる結果となりました。\n大変心苦しいご案内となりますが、何卒ご理解ください。\n\n数多くの企業の中から弊社にご応募いただき、また選考にお時間を割いてくださいましたことに、重ねて御礼申し上げます。\n\n末筆ながら、〇〇さんの今後ますますのご活躍を心よりお祈り申し上げます。\n──────────────\n株式会社SRL\n採用担当",
       tags:["一次選考","見送り","不合格通知"],
       note:"不合格通知は余計な情報を入れず短く丁寧に締めるのが基本。「ご希望に添いかねる結果」という表現は「不合格」より柔らかく学生の心理的な傷を和らげる。理由は書かない（聞かれたら「総合的な判断」と答える）。「ますますのご活躍」に温かみを込める。",
       good:["短く余計な情報がない","「ご希望に添いかねる」という表現が柔らかく配慮がある","「ますますのご活躍」に温かみがある"]},
    
      {id:15,phase:"二次選考結果",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"【選考結果のご連絡】二次選考通過・最終選考のご案内",
       body:"【選考結果のご連絡】\n\n〇〇 〇〇さん\n\n先日は、二次選考へお越しいただきありがとうございました。\n\n応募書類および面接内容を踏まえた社内審議の結果、【二次選考通過】となりました。〇〇さんにはぜひ次のステップにお進みいただければと存じます。\n\n最終選考に進むにあたって、下記のご対応をお願いします。\n\n――――――――\n\n① 識学サーベイの受検(所要10〜15分)\n・(メールアドレス) 宛に、ご案内メールをお送りします。\n・受検期限：〇月〇日(〇曜日) 11:00 まで\n・受検PASS：(パスワード)\n\n※設問「入社方法」は「新卒入社」を選択してください。\n※アルバイト経験がある場合は、その経験を念頭に回答してください。\n※経験がない設問は「もし入社したらどう考えるか」で回答いただいて構いません。\n\n――――――――\n\n② コアバリューワーク〈追加課題〉\nこれまでに絞り込んだ 自分の価値観(5〜7語) と、作成した自身のコアバリューフレーズを前提に、続きのワークに取り組んでください。\n(添付の「コアバリューワークシート」 をよく読み、指示に沿って進めてください)\n\n▶事前提出\n追加課題の最終設問の回答は、事前にフォームで回収します。\n\nフォームURL：(URL)\n\n【提出期限】〇月〇日(〇曜日) 11:00 まで\n\n※最終選考で内容をお伺いする可能性があります。これまでの価値観/PPSを改めて見直し、今回の追加課題の結果を共有できるようにしておいてください。\n\n――――――――\n\n③最終選考のご予約\n場所：株式会社SRL 本社(天神MENTビル4F)\n内容：弊社代表との個別面接\n\n予約リンク：(URL)\n※LINEトーク画面下〈選考予約〉からも予約可能です。\n\n【予約期限】〇月〇日(〇曜日) 11:00 まで\n\n――――――――\n（以下交通費支給該当者のみ）\n④交通費について\n当社では、遠方からお越しいただく皆さまのご負担をできる限り軽減できるよう、交通費の一部支給を行っております。\n\n「往復の交通費が20,000円を超える場合」が条件となります。\n支給額は「往復実費の50%（上限30,000円）」です。\n交通費に関する詳細は添付のPDFにまとめておりますので必ずご確認ください。\n\n――――――――\n\n選考日程のスケジュール調整が難しい場合や、その他ご不明点があれば遠慮なくご連絡ください。\n\nそれでは引き続き、よろしくお願いいたします。\n\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["二次選考","通過","最終選考","交通費","コアバリュー"],
       note:"最終選考案内は複数アクションが重なるため①〜③と番号整理が必須。交通費の案内を④として自然に付け加えることで、遠方学生への嬉しい驚きを演出できる。交通費案内は対象者（遠方学生）にのみ追記するよう分けておく運用が必要。",
       good:["①〜④で複数アクションを整理して漏れを防いでいる","交通費案内を自然な流れで追加している","「遠慮なくご連絡ください」で手続きへのハードルを下げている"]},
    
      {id:16,phase:"最終選考後",ch:"LINE",dir:"送信",date:"〇/〇（最終選考当日）",
       subj:"最終選考ご参加のお礼・結果連絡のご案内",
       body:"〇〇 〇〇さん\n\nこの度は最終選考にお越しいただき、ありがとうございました。\n\n選考結果は【〇/〇(〇曜日)】までに、ご連絡いたします。\nご連絡はお電話(SRL本社：092-732-3573)または本メッセージにて差し上げます。\n\nご連絡まで今しばらくお待ちください。\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["最終選考後","当日フォロー","結果連絡予告"],
       note:"最終選考当日中に送るのがマナー。短くて良い。重要なのは「いつ連絡するか」「どの手段で連絡するか」を明示すること。電話番号まで明記しているのは、学生が「LINEが来なかったら電話があるんだ」と安心できるから。これだけで学生の「いつ来るんだろう」という不安を最小化できる。",
       good:["選考当日中に送ることで学生の不安を最小化","結果連絡のタイミングと手段を両方明示している","電話番号まで記載して連絡方法を具体化している"]},
    
      {id:17,phase:"内定通知",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"【最終選考結果のご連絡】内定のお知らせ",
       body:"【最終選考結果のご連絡】\n〇〇 〇〇さん\n\n\nこの度は最終選考にお越しいただき、誠にありがとうございました。\n\nこれまでの選考でのご様子を踏まえ、社内にて慎重に審議した結果、〇〇さんを【内定】とさせていただくことが決定いたしましたので、ご連絡いたします。\n\nこれまでお時間をつくって選考にご参加いただいたこと、改めて感謝申し上げます。\n\nつきましては、今後の流れについて下記の通りご案内いたします。\n────────────────\n■ 今後の流れ\n① 内定承諾書のご送付について\n後日、〇〇さんのご自宅宛に「内定承諾書」を郵送いたします。\n\nお手元に届きましたら、内容をご確認のうえ、同封の案内に沿って必要事項のご記入・ご押印をお願いいたします。\n\nご記入いただいた内定承諾書は、同封の返信用封筒にて【〇月末日】までにご返送ください。\n\nなお、他社選考の状況などにより上記期日までのご返送が難しい場合は、ご相談下さい。\n\n② 内定者面談(懇親会)のご案内\n入社までの間に、先輩社員や役員と直接お話しいただける内定者向けの懇親会をご用意いたします。\n\n内定承諾にあたっての不安やご質問を解消し、働くイメージをすり合わせるための、内定者面談も実施予定です。\n\n日程につきましては、改めてメッセージにて候補日をご相談できればと存じます。\n────────────────\n\nまた、本日は事前にお知らせしておりました本社の電話番号ではなく、〇〇の番号よりお電話を差し上げております。\n紛らわしいご連絡となりましたこと、お詫び申し上げます。\n\nご不明な点や不安なことがあれば、どんな些細なことでも構いませんので遠慮なくご質問ください！\n\n今後、〇〇さんと一緒にお仕事ができることを、SRL一同とても楽しみにしております。\n\n今後ともどうぞよろしくお願いいたします。\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["内定","通知","承諾書","今後の流れ"],
       note:"内定通知は「おめでとうございます」で始めず「ご様子を踏まえ慎重に審議した結果」という言葉で選考の重みを伝える。「どんな些細なことでも構いません」という一文が内定辞退防止の観点で非常に重要。「SRL一同楽しみにしております」はチーム全体の歓迎感を演出できる。電話番号が違った件の謝罪を自然に入れているのも誠実で好印象。",
       good:["「慎重に審議した結果」という言葉で選考の重みを伝えている","今後の流れを①②で整理して不安を取り除いている","「SRL一同楽しみにしている」でチーム全体の歓迎感を演出"]},
    
      {id:18,phase:"内定後フォロー",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"【内定者面談】日程のご案内",
       body:"〇〇 〇〇さん\n\n今後の流れについてお話しする【内定者面談】のご案内です。\n\n★本面談は内定者の皆さん全員を対象に実施します。いずれかの枠でのご参加をお願いいたします！\n\n─────────\n◆内定者面談について\n・実施方法：オンライン(Zoom)\n・所要時間：30分程度\n・内容：\n　- 今後の流れのご説明\n　　(内定者懇親会や、その後のご案内スケジュール など)\n　- 働き方・配属イメージのすり合わせ\n　- 現時点での不安やご質問のヒアリング\n　　(他社選考の状況や、就活の進め方の相談もOKです！)\n\n※本面談をもって評価が変わったり、配属が決まったりすることはありません。内定後の不安や疑問をすり合わせるための、安心して話せる時間です。\n\n─────────\n◆日程について\n下記の予約フォームより、ご都合の良い日時を選択してください。\n\n▼予約フォーム\n(URL)\n\nご予約期限：〇/〇(〇曜日) 11:00まで\n\nフォームからのご予約をもって、面談日時の確定とさせていただきます。\n\n─────────\n\nご不明点がございましたら遠慮なくご連絡ください！\n引き続きよろしくお願いいたします。\n\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["内定後","面談","配属すり合わせ","他社相談OK"],
       note:"「評価が変わることはない」「配属が決まることはない」という免責の一文が非常に重要。これがないと学生が緊張して本音を話さず面談の意味が薄れる。「他社選考の状況や、就活の進め方の相談もOK」という一言が信頼関係構築に大きく貢献する。",
       good:["「評価が変わらない」の明示で学生の緊張を取り除いている","「他社選考の相談もOK」という一言が信頼感を高めている","「安心して話せる時間」というフレーミングが的確"]},
    
      {id:19,phase:"内定後フォロー",ch:"LINE",dir:"送信",date:"年末",
       subj:"本年のお礼と新年のご挨拶",
       body:"〇〇 〇〇さん\n\nこんにちは！\nSRL採用チームです。\n\nこの度は内定者面談にご参加いただき、ありがとうございました！\n\nまた本年は、インターンシップ・選考を通じてSRLに多くのお時間を割いてくださり、重ねて御礼申し上げます。\n\n人生の大切な節目の時期に、SRLを就職先の候補として選んでいただいていることを、心より嬉しく思っております🌿\n\nそして面談の中でもお伝えいたしましたが、内定者の皆さんには、安心して今後のステップを進めていただけるよう、懇親会・面談・フォロー機会などを来年以降も順次ご案内してまいります。\n\nこちらのLINEでも随時お知らせいたします！📢\n※現時点でご不明点等ございましたら、いつでもお気軽にご連絡ください！\n\n\n皆さまにとって新しい一年が、実り多く、穏やかに過ごせる一年となりますよう心よりお祈り申し上げます。\n\nどうぞ良いお年をお迎えください🎍\n来年も、どうぞよろしくお願いいたします。\n\n(こちらのメッセージは返信不要です☺)\n──────────────\n株式会社SRL\n採用担当 一同",
       tags:["年末挨拶","内定者","返信不要"],
       note:"年末の一斉送信だが「人生の大切な節目に選んでいただいたことを心より嬉しく思っています」という一文が形式的な年末挨拶との差別化になっている。「返信不要です」と明示することで学生の気遣いを取り除き、純粋に気持ちを届けるメッセージになる。「採用担当 一同」という署名がチーム全体の温かさを伝える。",
       good:["「人生の大切な節目に選んでいただいた」という言葉が心に響く","「返信不要」の一言で学生の気遣いを取り除いている","「一同」という署名でチーム全体の気持ちを表している"]},
    
      {id:20,phase:"内定後フォロー",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"内定者懇親会のご案内（速報）",
       body:"〇〇 〇〇さん\n\nお久しぶりです☺️！\n\n〇/〇(〇曜日)開催予定の内定者懇親会について、お待たせしており申し訳ありません。\n現在参加者を含め最終調整中ではありますが、現時点で確定している内容をお伝えいたします。\n\n【日時】\n〇/〇(〇曜日) 〇〇:〇〇~〇〇:〇〇\n\n・座談会：〇〇:〇〇〜〇〇:〇〇\n・懇親会(食事会)：〇〇:〇〇〜〇〇:〇〇\n\n【開催場所】\n・座談会：SRL本社\n・懇親会：本社付近の飲食店を予定しています\n\n詳細(確定した内容・場所、交通費やアレルギーの確認等)については、明日中に改めてご案内いたしますので、少々お待ちください！\n\n取り急ぎのご共有となりますが、よろしくお願いいたします。\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["懇親会","速報","内定後"],
       note:"確定前の速報案内。「お待たせしており申し訳ありません」という一言が正直で好印象。詳細未確定でも「現時点でわかることを先に共有する」という姿勢が学生の不安を和らげる。「明日中に改めてご案内」という期限を明示しているのも丁寧。",
       good:["確定前でも情報を先出しして学生の不安を軽減している","「明日中に改めてご案内」という期限明示が丁寧","「お待たせして申し訳ありません」の一言が誠実"]},
    
      {id:21,phase:"内定後フォロー",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"内定者懇親会のご案内（確定版）",
       body:"〇〇 〇〇さん\n\n内容が確定しましたので、内定者懇親会当日の詳細をご案内します🌿\n\n■当日のスケジュール\n\n15:50　SRL福岡本社 集合\n16:00〜17:30　座談会(場所：SRL福岡本社)\n18:00〜20:00　懇親会(場所：本社周辺の飲食店)\n\n■参加メンバーについて\n\n・座談会：SRL先輩社員が参加予定です\n・懇親会：先輩社員に加えて、代表の新田も参加予定です\n\n聞きたいことはNGなしでお答えします🙆‍♀️\n仕事のことはもちろん、就活・キャリア・正直な話まで、ぜひ事前に質問を考えておいてください！\n\n■事前のお願い(必須)\n\n▼以下2点をLINEでご返信ください\n〇/〇(〇曜日)までにお願いいたします！\n\n① アレルギーの有無\n② 本社までの往復交通費\n\n当日お会いできるのを、メンバー一同楽しみにしています☺️\n不明点があれば、いつでもご連絡ください！\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["懇親会","確定版","事前確認","アレルギー"],
       note:"「確定しましたので」という書き出しで速報版と確定版の違いを明確にする。アレルギーと交通費の2点をまとめて回収するのが効率的。「NGなし」「正直な話まで」という言葉で懇親会への期待値を最大限高めている。",
       good:["スケジュールが時系列で視覚的にわかりやすい","「NGなし・正直な話まで」で期待感を高めている","事前確認事項2点をまとめて回収している"]},
    
      {id:22,phase:"内定後フォロー",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"懇親会に向けて、事前アンケートのお願い",
       body:"〇〇 〇〇さん\n\n一点、追加のご依頼です。\n\n内定者座談会・懇親会に向けて、当日参加するSRLメンバーへの「聞いてみたいこと」を事前アンケートで回収いたします📝\n\nすでに会ったことのあるメンバーもいるかと思いますが、今回はこれまでのどの機会よりも近い距離で、仕事のこと・キャリアのこと・SRLのリアルについてざっくばらんに話せる時間を予定しています。\n\nその時間をより有意義なものにするため、ぜひ事前に質問を教えてもらえると嬉しいです😌\n\n――――――――――\n\n▼アンケートフォーム\n(URL)\n\n【〇/〇(〇曜日) 12:00まで】にご回答ください。\n\n質問は何個でもOKです。\nNGなしで回答するので「聞いていいのかな？」と思うことも大歓迎です！\n\n※いただいた質問は、当日の座談会・懇親会の中で取り上げる予定です\n\nよろしくお願いいたします！\n──────────────\n株式会社SRL\n採用担当 〇〇\n\n\n🌟参加予定メンバー\n\n・新田社長（懇親会より参加）\nSRL代表取締役。\n会社の想いやビジョン、これからのSRLについて、直接聞ける貴重な機会です。\n\n・〇〇 シニアマネージャー（運営管理部）\nSRLが選ばれる理由である\"SRLクオリティ\"を社内全体で実現するために、全国のチームを横断した仕組みづくりを担う〇〇さん。\nオペレーションや育成、チームの在り方を改善し続けるメンバーです。\n\n・〇〇 マネージャー（新規事業開発部）\n若くして新規事業に挑戦し続ける存在。\n直近の大きな企画であるEXILE衣装展や、Matin KimのPOP-UPを牽引する〇〇さんからは、SRLでの挑戦のリアルを知ることができます！\n\n・〇〇 店長（営業開発部）\n店舗運営の責任者。\nマネジメントやチームづくりに加え、クライアントとの関係づくり、SRLが大切にしている価値の提供についてもリアルに語ってくれます。",
       tags:["懇親会","事前アンケート","メンバー紹介","質問募集"],
       note:"懇親会前に質問を集めることで、当日の質疑の質が大幅に上がる。「聞いていいのかな？と思うことも大歓迎」という一言が学生の遠慮を取り除くのに非常に効果的。メンバー紹介に実際の事業名（EXILE衣装展、Matin Kim）を入れることで、仕事のリアル感が伝わる。",
       good:["「聞いていいのかな？も大歓迎」で遠慮を取り除いている","具体的な事業名を入れてメンバーのリアルさを演出","質問を事前収集することで当日の質の向上につながる"]},
    
      {id:23,phase:"内定後フォロー",ch:"LINE",dir:"送信",date:"〇/〇（懇親会前日）",
       subj:"【懇親会】交通費の領収書についてのご案内",
       body:"〇〇 〇〇さん\n質問フォームへのご回答ありがとうございます！内容、確認いたしました。\n\n──\n〇交通費についての追加のご案内です。\n明日は可能な範囲で領収書をお持ちください。なお、領収書が発行されない区間（バスなど）については、ICカードの利用履歴などでご提出いただいても問題ありません！\n\n領収書はこちらで回収させていただきます。\n──\n\n明日は気をつけてお越しください！\nお会いできるのを楽しみにお待ちしております☺️\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["懇親会","領収書","交通費","前日案内"],
       note:"領収書の事前告知は当日のスムーズな運営のために必要。「領収書が発行されない区間はICカードの利用履歴でもOK」という一言が親切で、学生が困らないよう先回りした配慮になっている。最後の「お会いできるのを楽しみに」でワクワク感を高めて締める。",
       good:["領収書の代替手段（ICカード履歴）まで案内している","短く要件だけを伝えている","最後に期待感を高める一言で締めている"]},
    
      {id:24,phase:"内定後フォロー",ch:"LINE",dir:"送信",date:"〇/〇（懇親会翌日）",
       subj:"懇親会ご参加のお礼・アンケートと交通費のご案内",
       body:"〇〇 〇〇さん\n\nこの度は、内定者懇親会にご参加いただき、ありがとうございました！\n\n〇〇さん含め、皆さん一人ひとりの質問や言葉から「働くこと」や「これからの選択」について真剣に向き合っていることが伝わってきて、私たちにとっても、とても貴重な時間になりました。\n\n今回の座談会・懇親会を、今後よりよい場にしていくために、ぜひ率直なご感想お聞かせください🙂‍↕️お忙しい中恐れ入りますが、今週中の回答をお願いいたします。\n\n「よかった点」も「もう少しこうだったら…」も大歓迎です！\n今後の企画やコミュニケーションに、しっかり活かしていきます。\n\n▼アンケートはこちら\n(URL)\n\n\n☆交通費について\n本来当日お渡しする予定でしたが、こちらの不手際によりお渡しできておらず、誠に申し訳ございません、、\n\n後日お振込みにて対応させていただきたく存じます。\nお手数ですが、添付のシートをご確認のうえ、振込先の口座情報をご入力ください。\n\n(URL)\n\n\nその他ご不明点等ございましたらいつでもご連絡ください！\n引き続きよろしくお願いいたします☺️\n──────────────\n株式会社SRL\n採用担当 〇〇",
       tags:["懇親会後","アンケート","交通費","お詫び"],
       note:"交通費の渡し忘れというミスを翌日のメッセージに自然に組み込んで謝罪しているのが誠実。「こちらの不手際」とはっきり書いて言い訳しないのがポイント。「もう少しこうだったら…も大歓迎」と本音を求めることで改善につながる声が集まりやすくなる。「今後の企画やコミュニケーションに活かします」という一言が、回答する意義を感じさせる。",
       good:["「こちらの不手際」とはっきり謝罪して言い訳しない","「もう少しこうだったら…も大歓迎」で本音のアンケートを促している","「しっかり活かします」という言葉が回答する意義を感じさせる"]},
    
      {id:25,phase:"内定承諾後",ch:"LINE",dir:"送信",date:"〇/〇",
       subj:"内定承諾書のご受領と、これからについて",

      {id:26,phase:"入社前フォロー",ch:"LINE",dir:"送信",date:"〇/〇",

const TAG_COLORS = [
  "#e8425a","#e86842","#e8a442","#5cb85c","#42a8e8","#7b5ea7","#e84295","#42c8c8",
  "#a87b5e","#5e7ba8","#c8a842","#5ea87b","#a8425e","#427ba8","#7ba842"
];
function tagColor(tag) {
  let h = 0;
  for (let i = 0; i < tag.length; i++) h = (h * 31 + tag.charCodeAt(i)) & 0xffff;
  return TAG_COLORS[h % TAG_COLORS.length];
}

function App() {
  const [view, setView] = useState("home");
  const [q, setQ] = useState("");
  const [activePh, setActivePh] = useState(null);
  const [activeTag, setActiveTag] = useState(null);
  const [sel, setSel] = useState(null);
  const [showNote, setShowNote] = useState(true);
  const [msgs, setMsgs] = useState(D);
  const [modal, setModal] = useState(false);
  const [editId, setEditId] = useState(null);
  const [f, setF] = useState({ phase:"", dir:"送信", ch:"LINE", date:"", subj:"", body:"", tags:"", note:"", good:"" });

  const handleQ = (val) => {
    setQ(val);
    if (val.trim()) { setActivePh(null); setActiveTag(null); setView("results"); }
    else if (view === "results") setView("home");
  };

  const handleTag = (tag) => { setActiveTag(tag); setActivePh(null); setQ(""); setView("results"); };
  const handlePhase = (ph) => { setActivePh(ph); setActiveTag(null); setQ(""); setView("results"); };

  const filtered = useMemo(() => msgs.filter(m => {
    if (activePh && m.phase !== activePh) return false;
    if (activeTag && !m.tags.includes(activeTag)) return false;
    const lq = q.toLowerCase();
    if (!lq) return true;
    return m.subj.toLowerCase().includes(lq) || m.body.toLowerCase().includes(lq) ||
      m.note.toLowerCase().includes(lq) || m.tags.some(t => t.includes(lq)) || m.phase.includes(lq);
  }), [msgs, q, activePh, activeTag]);

  const hl = (text) => {
    if (!q) return text;
    const parts = text.split(new RegExp("(" + q + ")", "gi"));
    return parts.map((p, i) => p.toLowerCase() === q.toLowerCase()
      ? <mark key={i} style={{ background:"#fff3cd", borderRadius:2, padding:"0 1px" }}>{p}</mark> : p);
  };

  const openAdd = () => { setEditId(null); setF({ phase:"", dir:"送信", ch:"LINE", date:"", subj:"", body:"", tags:"", note:"", good:"" }); setModal(true); };
  const openEdit = (m) => { setEditId(m.id); setF({ phase:m.phase, dir:m.dir, ch:m.ch, date:m.date, subj:m.subj, body:m.body, tags:m.tags.join("、"), note:m.note||"", good:(m.good||[]).join("、") }); setModal(true); };
  const saveFn = () => {
    if (!f.subj.trim()) { alert("件名を入力してください"); return; }
    const entry = { ...f, tags: f.tags.split(/[,、]/).map(s=>s.trim()).filter(Boolean), good: f.good.split(/[,、]/).map(s=>s.trim()).filter(Boolean) };
    if (editId) {
      setMsgs(prev => prev.map(m => m.id === editId ? { ...m, ...entry } : m));
      setSel(prev => prev && prev.id === editId ? { ...prev, ...entry } : prev);
    } else {
      const nid = Math.max(...msgs.map(m=>m.id)) + 1;
      setMsgs(prev => [...prev, { id: nid, ...entry }]);
    }
    setModal(false);
  };

  const baseStyle = { fontFamily:"'Hiragino Kaku Gothic ProN','Meiryo',sans-serif", background:"#fafafa", minHeight:600 };

  // ===== DETAIL VIEW =====
  if (sel) return (
    <div style={baseStyle}>
      <NavBar q={q} onQ={handleQ} onAdd={openAdd} />
      <div style={{ ...S.page, paddingTop:28 }}>
        <button onClick={() => setSel(null)} style={{ background:"none", border:"none", fontSize:13, color:"#888", cursor:"pointer", padding:"0 0 20px", display:"flex", alignItems:"center", gap:4 }}>
          ‹ 戻る
        </button>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12, alignItems:"center" }}>
          <span style={{ fontSize:11, color:"#888", background:"#f0f0f0", borderRadius:10, padding:"3px 10px" }}>{sel.phase}</span>
          <span style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color: sel.ch==="LINE" ? "#06c755" : "#666" }}>
            <span style={{ width:7, height:7, borderRadius:"50%", background: sel.ch==="LINE" ? "#06c755" : "#888", display:"inline-block" }}></span>
            {sel.ch}
          </span>
          <span style={{ fontSize:11, color:"#aaa" }}>{sel.date}</span>
        </div>
        <h1 style={{ fontSize:20, fontWeight:600, color:"#1a1a1a", lineHeight:1.4, marginBottom:20 }}>{sel.subj}</h1>

        <div style={{ background:"#fff", border:"1px solid #ebebeb", borderRadius:10, padding:"20px 22px", marginBottom:14 }}>
          <pre style={{ fontSize:13, lineHeight:2, whiteSpace:"pre-wrap", wordBreak:"break-word", fontFamily:"inherit", color:"#2a2a2a", margin:0 }}>{hl(sel.body)}</pre>
        </div>

        <CopyBtn text={sel.body} />

        <div style={{ display:"flex", gap:6, flexWrap:"wrap", margin:"16px 0" }}>
          {sel.tags.map(t => (
            <button key={t} onClick={() => { setSel(null); handleTag(t); }}
              style={{ display:"flex", alignItems:"center", gap:5, background:"#fff", border:"1px solid #ebebeb", borderRadius:12, padding:"4px 10px", fontSize:11, color:"#444", cursor:"pointer" }}>
              <span style={{ width:6, height:6, borderRadius:"50%", background:tagColor(t), display:"inline-block", flexShrink:0 }}></span>
              {t}
            </button>
          ))}
        </div>

        {sel.note && (
          <div style={{ marginTop:20 }}>
            <button onClick={() => setShowNote(!showNote)}
              style={{ display:"flex", alignItems:"center", gap:6, background:"none", border:"none", cursor:"pointer", fontSize:12, color:"#888", padding:"4px 0", marginBottom: showNote ? 10 : 0 }}>
              <span>💬</span> 担当者メモ
              <span style={{ fontSize:10 }}>{showNote ? "▲" : "▼"}</span>
            </button>
            {showNote && (
              <div style={{ background:"#fffdf0", border:"1px solid #f0e8c0", borderLeft:"3px solid #e8c84a", borderRadius:8, padding:"14px 16px", fontSize:12, lineHeight:1.9, color:"#4a3a10" }}>
                {hl(sel.note)}
              </div>
            )}
          </div>
        )}

        {sel.good && sel.good.length > 0 && (
          <div style={{ marginTop:16 }}>
            <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>✅ このメッセージの良いポイント</div>
            <div style={{ background:"#f6fff6", border:"1px solid #d4edda", borderRadius:8, padding:"12px 16px" }}>
              {sel.good.map((p, i) => (
                <div key={i} style={{ fontSize:12, color:"#2a4a2a", lineHeight:1.7, marginBottom: i < sel.good.length-1 ? 4 : 0 }}>・{p}</div>
              ))}
            </div>
          </div>
        )}

        <div style={{ marginTop:20, paddingTop:16, borderTop:"1px solid #ebebeb", display:"flex", justifyContent:"flex-end" }}>
          <button onClick={() => openEdit(sel)} style={{ background:"none", border:"1px solid #ddd", borderRadius:8, padding:"7px 16px", fontSize:12, color:"#555", cursor:"pointer" }}>編集する</button>
        </div>
      </div>
      {modal && <Modal f={f} setF={setF} editId={editId} onSave={saveFn} onClose={() => setModal(false)} />}
    </div>
  );

  // ===== RESULTS VIEW =====
  if (view === "results") return (
    <div style={baseStyle}>
      <NavBar q={q} onQ={handleQ} onAdd={openAdd} />
      <div style={{ ...S.page, paddingTop:28 }}>
        <button onClick={() => { setView("home"); setQ(""); setActivePh(null); setActiveTag(null); }}
          style={{ background:"none", border:"none", fontSize:13, color:"#888", cursor:"pointer", padding:"0 0 20px", display:"flex", alignItems:"center", gap:4 }}>
          ‹ 戻る
        </button>

        {(q || activePh || activeTag) && (
          <h2 style={{ fontSize:18, fontWeight:600, color:"#1a1a1a", marginBottom:20 }}>
            "{q || activePh || ("#" + activeTag)}"の検索結果
          </h2>
        )}

        {filtered.length === 0
          ? <EmptyState q={q || activePh || activeTag || ""} />
          : filtered.map(m => (
            <div key={m.id} onClick={() => setSel(m)}
              style={{ background:"#fff", border:"1px solid #ebebeb", borderRadius:10, padding:"16px 18px", marginBottom:10, cursor:"pointer", transition:"box-shadow .15s" }}
              onMouseEnter={e => e.currentTarget.style.boxShadow="0 2px 12px rgba(0,0,0,.08)"}
              onMouseLeave={e => e.currentTarget.style.boxShadow="none"}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, flexWrap:"wrap" }}>
                <span style={{ fontSize:11, color:"#888", background:"#f5f5f5", borderRadius:10, padding:"2px 9px" }}>{m.phase}</span>
                <span style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color: m.ch==="LINE" ? "#06c755" : "#888" }}>
                  <span style={{ width:6, height:6, borderRadius:"50%", background: m.ch==="LINE" ? "#06c755" : "#aaa", display:"inline-block" }}></span>
                  {m.ch}
                </span>
                <span style={{ marginLeft:"auto", fontSize:11, color:"#bbb" }}>{m.date}</span>
              </div>
              <div style={{ fontSize:14, fontWeight:600, color:"#1a1a1a", lineHeight:1.5, marginBottom:8 }}>{hl(m.subj)}</div>
              <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                {m.tags.map(t => (
                  <span key={t} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#666" }}
                    onClick={e => { e.stopPropagation(); handleTag(t); }}>
                    <span style={{ width:6, height:6, borderRadius:"50%", background:tagColor(t), display:"inline-block" }}></span>
                    {t}
                  </span>
                ))}
              </div>
            </div>
          ))
        }
      </div>
      {modal && <Modal f={f} setF={setF} editId={editId} onSave={saveFn} onClose={() => setModal(false)} />}
    </div>
  );

  // ===== HOME VIEW =====
  return (
    <div style={baseStyle}>
      <NavBar q={q} onQ={handleQ} onAdd={openAdd} />
      <div style={{ ...S.page, paddingTop:36 }}>

        <div style={{ marginBottom:32 }}>
          <div style={{ fontSize:12, fontWeight:600, color:"#aaa", letterSpacing:1, marginBottom:12, textTransform:"uppercase" }}>フェーズ</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(160px,1fr))", gap:8 }}>
            {PHASE_ORDER.filter(p => PHASE_COUNTS[p] > 0).map(p => (
              <button key={p} onClick={() => handlePhase(p)}
                style={{ padding:"14px 14px", background:"#fff", border:"1px solid #ebebeb", borderRadius:10, cursor:"pointer", textAlign:"left", transition:"all .15s" }}
                onMouseEnter={e => { e.currentTarget.style.boxShadow="0 2px 10px rgba(0,0,0,.08)"; e.currentTarget.style.borderColor="#ccc"; }}
                onMouseLeave={e => { e.currentTarget.style.boxShadow="none"; e.currentTarget.style.borderColor="#ebebeb"; }}>
                <div style={{ fontSize:13, fontWeight:500, color:"#1a1a1a", marginBottom:3 }}>{p}</div>
                <div style={{ fontSize:11, color:"#bbb" }}>{PHASE_COUNTS[p]}件</div>
              </button>
            ))}
          </div>
        </div>

        <div>
          <div style={{ fontSize:12, fontWeight:600, color:"#aaa", letterSpacing:1, marginBottom:12, textTransform:"uppercase" }}>タグ</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
            {ALL_TAGS.map(t => (
              <button key={t} onClick={() => handleTag(t)}
                style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 12px", background:"#fff", border:"1px solid #ebebeb", borderRadius:16, fontSize:12, color:"#444", cursor:"pointer", transition:"all .15s" }}
                onMouseEnter={e => { e.currentTarget.style.borderColor="#ccc"; e.currentTarget.style.background="#fafafa"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor="#ebebeb"; e.currentTarget.style.background="#fff"; }}>
                <span style={{ width:7, height:7, borderRadius:"50%", background:tagColor(t), display:"inline-block", flexShrink:0 }}></span>
                {t}
              </button>
            ))}
          </div>
        </div>
      </div>
      {modal && <Modal f={f} setF={setF} editId={editId} onSave={saveFn} onClose={() => setModal(false)} />}
    </div>
  );
}

function Modal({ f, setF, editId, onSave, onClose }) {
  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,.35)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 }}>
      <div style={{ background:"#fff", borderRadius:12, width:"min(520px,94vw)", maxHeight:"90vh", overflowY:"auto", padding:24, fontFamily:"'Hiragino Kaku Gothic ProN','Meiryo',sans-serif", boxShadow:"0 8px 40px rgba(0,0,0,.15)" }}>
        <div style={{ fontSize:15, fontWeight:600, color:"#1a1a1a", marginBottom:18 }}>{editId ? "メッセージを編集" : "新規メッセージを追加"}</div>
        {[["フェーズ","phase"],["日付","date"],["件名","subj"]].map(([label, key]) => (
          <div key={key} style={{ marginBottom:12 }}>
            <label style={{ display:"block", fontSize:11, color:"#888", marginBottom:4 }}>{label}</label>
            <input value={f[key]} onChange={e => setF(p => ({ ...p, [key]: e.target.value }))}
              style={{ width:"100%", padding:"8px 10px", border:"1px solid #e0e0e0", borderRadius:7, fontSize:13, boxSizing:"border-box", outline:"none" }} />
          </div>
        ))}
        <div style={{ display:"flex", gap:10, marginBottom:12 }}>
          {[["送受信","dir",["送信","受信"]],["媒体","ch",["LINE","メール","その他"]]].map(([label, key, opts]) => (
            <div key={key} style={{ flex:1 }}>
              <label style={{ display:"block", fontSize:11, color:"#888", marginBottom:4 }}>{label}</label>
              <select value={f[key]} onChange={e => setF(p => ({ ...p, [key]: e.target.value }))}
                style={{ width:"100%", padding:"8px 10px", border:"1px solid #e0e0e0", borderRadius:7, fontSize:13, background:"#fff" }}>
                {opts.map(o => <option key={o}>{o}</option>)}
              </select>
            </div>
          ))}
        </div>
        {[["本文","body",7],["タグ（読点区切り）","tags",2],["担当者メモ","note",3],["良いポイント（読点区切り）","good",2]].map(([label, key, rows]) => (
          <div key={key} style={{ marginBottom:12 }}>
            <label style={{ display:"block", fontSize:11, color:"#888", marginBottom:4 }}>{label}</label>
            <textarea rows={rows} value={f[key]} onChange={e => setF(p => ({ ...p, [key]: e.target.value }))}
              style={{ width:"100%", padding:"8px 10px", border:"1px solid #e0e0e0", borderRadius:7, fontSize:13, resize:"vertical", lineHeight:1.7, boxSizing:"border-box", fontFamily:"inherit", outline:"none" }} />
          </div>
        ))}
        <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:10 }}>
          <button onClick={onClose} style={{ background:"none", border:"1px solid #ddd", borderRadius:7, padding:"9px 18px", fontSize:13, cursor:"pointer", color:"#555" }}>キャンセル</button>
          <button onClick={onSave} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:7, padding:"9px 18px", fontSize:13, cursor:"pointer", fontWeight:600 }}>保存する</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
